background {
    monitor =
    path=/home/youruser/.cache/current_wallpaper
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
}
# USER GREETING
label {
    monitor =
    text = Hi there, $USER
    color = rgba(200, 200, 200, 1.0)
    font_size = 25
    font_family = JetBrains Mono
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    
    # Monochrome Force
    outer_color = rgb(0, 0, 0)   
    check_color = rgb(255, 255, 255)
    fail_color = rgb(255, 255, 255)
    
    # Text & Font Colors
    font_color = rgb(0, 0, 0)
    # This forces the "Authentication Failed" text to black
    fail_text = <span color="rgb(0,0,0)"><i>$FAIL</i> <b>($ATTEMPTS)</b></span>
    
    # Standard settings
    inner_color = rgb(255, 255, 255)
    dots_size = 0.33
    dots_spacing = 0.15
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
} 