font_family JetBrains Mono Medium
bold_font JetBrains Mono Bold
italic_font JetBrains Mono Italic
font_size 11
text_composition_strategy legacy
bold_is_bright yes

# Core Colors
background            #0a0a0a
foreground            #f5f5f5
selection_background  #404040
selection_foreground  #f5f5f5
cursor                #ffffff

# Tabs and Borders
active_tab_background   #bdbdbd
active_tab_foreground   #0a0a0a
inactive_tab_background #1f1f1f
inactive_tab_foreground #404040
active_border_color     #bdbdbd
inactive_border_color   #1f1f1f

# ANSI Colors (Mapping the "different colors" to your palette)
# Black & Dark Gray
color0 #0a0a0a
color8 #1f1f1f

# Standard Noir Grays (mapped from your active/selected/alt)
color1 #404040
color2 #bdbdbd
color3 #f5f5f5
color4 #1f1f1f
color5 #404040
color6 #bdbdbd
color7 #f5f5f5

# Bright Variants (mapping to your urgent/foreground)
color9  #ffffff
color10 #f5f5f5
color11 #ffffff
color12 #f5f5f5
color13 #ffffff
color14 #f5f5f5
color15 #ffffff